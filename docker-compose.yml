services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_APP_NAME: ${VITE_APP_NAME:-ChatApp}
        VITE_REVERB_APP_KEY: ${VITE_REVERB_APP_KEY:-local-key}
        VITE_REVERB_HOST: ${VITE_REVERB_HOST:-localhost}
        VITE_REVERB_PORT: ${VITE_REVERB_PORT:-9000}
        VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME:-http}
    image: chat-app:prod
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-chatapp}
      DB_USERNAME: ${DB_USERNAME:-chatapp}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: ${REVERB_APP_ID:-chat-app}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-local-key}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-local-secret}
      REVERB_HOST: reverb
      REVERB_PORT: 9000
      REVERB_SCHEME: http
    ports:
      - "8000:80"
    depends_on:
      db:
        condition: service_healthy

  queue:
    image: chat-app:prod
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-chatapp}
      DB_USERNAME: ${DB_USERNAME:-chatapp}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: ${REVERB_APP_ID:-chat-app}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-local-key}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-local-secret}
      REVERB_HOST: reverb
      REVERB_PORT: 9000
      REVERB_SCHEME: http
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]

  reverb:
    image: chat-app:prod
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-chatapp}
      DB_USERNAME: ${DB_USERNAME:-chatapp}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: ${REVERB_APP_ID:-chat-app}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-local-key}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-local-secret}
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 9000
    ports:
      - "9000:9000"
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=9000"]

  migrate:
    image: chat-app:prod
    profiles: ["tools"]
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-chatapp}
      DB_USERNAME: ${DB_USERNAME:-chatapp}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    depends_on:
      db:
        condition: service_healthy
    command: ["php", "artisan", "migrate", "--force"]

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-chatapp}
      POSTGRES_USER: ${DB_USERNAME:-chatapp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  db_data: